<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient hinzufügen</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1 class="mb-3">Patient hinzufügen</h1>

    <form th:action="@{/patient/add}" th:object="${patient}" method="post">

        <div class="container">

            <label>Vorname</label>
            <input type="text" class="form-control w-auto" th:field="*{name}">

            <label>Nachname</label>
            <input type="text" class="form-control w-auto" th:field="*{surname}">

            <label>SVNR</label>
            <input type="text" class="form-control w-auto" th:field="*{socialsecuritynumber}">

            <label>Geschlecht</label>
            <select class="form-select w-auto" th:field="*{gender}">
                <option value="M">Männlich</option>
                <option value="F">Weiblich</option>
            </select>

            <label>Geburtsdatum</label>
            <input type="date" class="form-control w-auto" th:field="*{birth}">

            <button class="btn btn-primary">Speichern</button>

        </div>

    </form>

</div>

</body>
</html>
