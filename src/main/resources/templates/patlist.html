<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patienten</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <a class="navbar-brand" href="/"> Radiologie</a>
    </div>
</nav>

<div class="container">

    <h2 class="mb-1">Patienten</h2>

    <a href="/patient/add" >+ Neuer Patient</a>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Nachname</th>
            <th>Aktionen</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${patients}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.surname}"></td>
            <td>
                <a
                   th:href="@{'/patient/edit/' + ${p.id}}">Edit</a>

                <a
                   th:href="@{'/patient/delete/' + ${p.id}}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
